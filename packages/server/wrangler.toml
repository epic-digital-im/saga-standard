name = "saga-server"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "63396a5b2b279efdc0e1618233dcdc17"

[triggers]
crons = ["* * * * *"]

[vars]
SERVER_NAME = "SAGA Reference Hub"
SUPPORTED_CHAINS = "eip155:8453,eip155:1,eip155:137,solana:mainnet"
# On-chain indexer (Base Sepolia for local dev)
BASE_RPC_URL = "https://sepolia.base.org"
AGENT_IDENTITY_CONTRACT = "0x1a706cc37ea90af568dce0f637aeb60884c9fadb"
ORG_IDENTITY_CONTRACT = "0x4f297f7b3439d1bdd548ba897d3b82b5fc2bdd26"
INDEXER_CHAIN = "eip155:84532"
INDEXER_START_BLOCK = "39400000"

# ── Local development ────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "saga-hub"
database_id = "local-dev-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "saga-documents"

[[kv_namespaces]]
binding = "SESSIONS"
id = "saga-sessions-dev"

[[kv_namespaces]]
binding = "INDEXER_STATE"
id = "saga-indexer-dev"

[[kv_namespaces]]
binding = "RELAY_MAILBOX"
id = "saga-relay-mailbox-dev"

[durable_objects]
bindings = [
  { name = "RELAY_ROOM", class_name = "RelayRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelayRoom"]

[dev]
port = 8787
local_protocol = "http"

# ── Staging ──────────────────────────────────────────────────────────

[env.staging]
name = "saga-server-staging"

[env.staging.triggers]
crons = ["* * * * *"]

[env.staging.vars]
SERVER_NAME = "SAGA Reference Hub (Staging)"
SUPPORTED_CHAINS = "eip155:8453,eip155:1,eip155:137,solana:mainnet"
BASE_RPC_URL = "https://sepolia.base.org"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "saga-hub-staging"
database_id = "1433af34-a30c-48dc-b543-25848b0a9c80"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "saga-documents-staging"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "bc4475e0858f422590dfb9f1d096ebe5"

[[env.staging.kv_namespaces]]
binding = "INDEXER_STATE"
id = "8557943d39f74dc9a6198e6dee6a19f8"

[[env.staging.kv_namespaces]]
binding = "RELAY_MAILBOX"
id = "saga-relay-mailbox-staging"

# ── Production ───────────────────────────────────────────────────────

[env.production]
name = "saga-server"
workers_dev = true
routes = [
  { pattern = "api.saga-standard.dev", custom_domain = true }
]

[env.production.triggers]
crons = ["* * * * *"]

[env.production.vars]
SERVER_NAME = "SAGA Reference Hub"
SUPPORTED_CHAINS = "eip155:8453,eip155:1,eip155:137,solana:mainnet"

[[env.production.d1_databases]]
binding = "DB"
database_name = "saga-hub"
database_id = "3234f9fc-e05c-44ce-800b-4d132c23b324"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "saga-documents-production"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "5983236e52ad4f1c973cf059c52a2611"

[[env.production.kv_namespaces]]
binding = "INDEXER_STATE"
id = "saga-indexer-production"

[[env.production.kv_namespaces]]
binding = "RELAY_MAILBOX"
id = "saga-relay-mailbox-production"
